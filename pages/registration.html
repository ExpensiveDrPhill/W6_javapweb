<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
        <div class="site-header__inner">
            <div class="site-brand">W6 JavaScript Web</div>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Home</a>
                <a href="registration.html">Registration Form</a>
                <a href="dropdown.html">Dropdown &amp; Kodepos</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="section">
            <p class="section__lead">Page 1 of 2</p>
            <h1>Registration Form</h1>
        </section>

        <section class="form-card">
            <form id="registrationForm" novalidate>
                <div class="form-grid">
                    <div class="field">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" />
                        <span id="name-error" class="error-message"></span>
                    </div>

                    <div class="field">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" placeholder="Enter your address" />
                        <span id="address-error" class="error-message"></span>
                    </div>

                    <div class="field">
                        <label for="email">E-mail Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" />
                        <span id="email-error" class="error-message"></span>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" />
                        <span id="password-error" class="error-message"></span>
                    </div>

                    <div class="field">
                        <label for="subject">Select Your Course</label>
                        <select id="subject" name="subject">
                            <option value="">Select Course</option>
                            <option value="TEKNIK_ELEKTRO">Teknik Elektro</option>
                            <option value="TEKNIK_INFORMATIKA">Teknik Informatika</option>
                            <option value="DKV">DKV</option>
                            <option value="ILMU_EKNOMI">Ilmu Eknomi</option>
                        </select>
                        <span id="subject-error" class="error-message"></span>
                    </div>

                    <div class="field field--full">
                        <label for="comment">College Name</label>
                        <textarea id="comment" name="comment" placeholder="Tell us your college name"></textarea>
                    </div>

                    <div class="field field--full">
                        <div class="check-row">
                            <input type="checkbox" id="agree" name="agree" />
                            <label for="agree">I agree to the above information</label>
                        </div>
                        <span id="agree-error" class="error-message"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="button">Send</button>
                    <button type="reset" class="button button--secondary">Reset</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
